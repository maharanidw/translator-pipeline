<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Pipeline | Extracta</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --gradient: linear-gradient(135deg, #a855f7, #3b82f6);
            --text-title: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-title);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .hero {
            max-width: 800px;
            padding: 40px 20px;
            animation: fadeUp 1s ease-out;
        }

        .title {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background-color: var(--primary);
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            gap: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: translateX(4px);
        }

        .features {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 60px;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        
        .feature-item:hover .feature-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .feature-text {
            font-size: 0.95rem;
            font-weight: 500;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .title {
                font-size: 2.5rem;
            }
            .subtitle {
                font-size: 1.1rem;
            }
            .features {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="title">Translator Pipeline</h1>
        <p class="subtitle">Platform ekstraksi dan terjemahan otomatis Novel Web. Ditenagai oleh Google Gemini API untuk kualitas bahasa dan kecepatan real-time.</p>
        
        <a href="/dashboard/index.html" class="btn">
            Masuk ke Dashboard
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
            </svg>
        </a>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">✨</div>
                <div class="feature-text">High-Speed API</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📱</div>
                <div class="feature-text">Responsive Reader</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📄</div>
                <div class="feature-text">PDF Export Ready</div>
            </div>
        </div>
    </div>
</body>
</html>
